<div class="bg-gray-800 p-8 rounded-xl shadow-2xl max-w-md mx-auto animate-fade-in">
  <h1 class="text-3xl font-bold text-cyan-400 text-center">Login</h1>
  @if (authService.isLoggedIn()) {
    <p class="mt-4 text-gray-300 text-center">Du bist bereits als {{ authService.username() ?? 'User' }} angemeldet.</p>
    <a routerLink="/movies" class="block w-full mt-6 text-center bg-cyan-600 text-white font-bold py-3 px-6 rounded-lg hover:bg-cyan-700 transition-all duration-300">Zu den Filmen</a>
  } @else {
    <p class="mt-4 text-gray-300 text-center">Die Anmeldung wird ueber Keycloak durchgefuehrt.</p>
    <button type="button" (click)="authService.login('/movies')" class="w-full mt-6 bg-cyan-600 text-white font-bold py-3 px-6 rounded-lg hover:bg-cyan-700 transition-all duration-300">Mit Keycloak einloggen</button>
  }
</div>
